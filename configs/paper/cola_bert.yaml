# BERT on CoLA — ICML Paper
#
# CoLA: Linguistic acceptability, hard task (high aleatoric uncertainty), binary.
# 8,551 total. n_cal=1000 (12%), n_train=7,551.
#
# Training HPs: defaults from Devlin 2019, pending Bayesian optimization.

dataset:
  name: cola
  n_cal: 1000
  max_length: 128

model:
  name: google-bert/bert-base-uncased
  use_spectral_norm: false

training:
  # Best HPs from Bayesian optimization (Optuna TPE, 20 trials, val_acc=0.851)
  learning_rate: 3.0458e-5
  per_device_train_batch_size: 64
  num_train_epochs: 12
  weight_decay: 0.0325
  warmup_ratio: 0.1
  seed: 42

uncertainty:
  scores:
    - max_proba_complement
    - predictive_entropy
    - doctor
    - energy
    - mahalanobis_distance

score_calibration:
  methods:
    - none
    - uniform_mass

output:
  cache_dir: cache/paper
