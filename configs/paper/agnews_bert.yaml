# BERT on AG News (10% subsample) — ICML Paper
#
# AG News: Topic classification, 4 classes (K=4), moderate resource.
# 10% of 120,000 = 12,000 available. n_cal=1000 (8%), n_train=11,000.
# Multi-class: softmax scores diverge — score choice matters for ROCAUC.
#
# Training HPs: defaults from Sun 2019 (BERT on AG News), pending Bayesian optimization.

dataset:
  name: agnews
  n_train: 11000
  n_cal: 1000
  max_length: 128

model:
  name: google-bert/bert-base-uncased
  use_spectral_norm: false

training:
  # Best HPs from Bayesian optimization (Optuna TPE, 20 trials, val_acc=0.929)
  learning_rate: 5.7701e-5
  per_device_train_batch_size: 64
  num_train_epochs: 12
  weight_decay: 0.0170
  warmup_ratio: 0.1
  seed: 42

uncertainty:
  scores:
    - max_proba_complement
    - predictive_entropy
    - doctor
    - energy
    - mahalanobis_distance

score_calibration:
  methods:
    - none
    - uniform_mass

output:
  cache_dir: cache/paper
