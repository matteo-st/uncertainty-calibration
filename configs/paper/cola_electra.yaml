# ELECTRA on CoLA — ICML Paper
#
# CoLA: Linguistic acceptability, hard task (high aleatoric uncertainty), binary.
# 8,551 total. n_cal=1000 (12%), n_train=7,551.
#
# Training HPs: defaults from Vazhentsev 2022 reference, pending Bayesian optimization.

dataset:
  name: cola
  n_cal: 1000
  max_length: 128

model:
  name: google/electra-base-discriminator
  use_spectral_norm: false

training:
  # Defaults pending Bayesian optimization (~20 trials with Optuna TPE)
  learning_rate: 1.0e-5
  per_device_train_batch_size: 4
  num_train_epochs: 8
  weight_decay: 0.0
  warmup_ratio: 0.1
  seed: 42

uncertainty:
  scores:
    - max_proba_complement
    - predictive_entropy
    - doctor
    - energy
    - mahalanobis_distance

score_calibration:
  methods:
    - none
    - uniform_mass

output:
  cache_dir: cache/paper
