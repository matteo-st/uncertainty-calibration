# DeBERTa-v3 on CoLA — ICML Paper
#
# CoLA: Linguistic acceptability, hard task (high aleatoric uncertainty), binary.
# 8,551 total. n_cal=1000 (12%), n_train=7,551.
#
# Note: Vazhentsev 2022 uses DeBERTa v1, not v3. HPs are NOT transferred.
# Training HPs: defaults from MS GitHub DeBERTa reference, pending Bayesian optimization.

dataset:
  name: cola
  n_cal: 1000
  max_length: 128

model:
  name: microsoft/deberta-v3-base
  use_spectral_norm: false

training:
  # Best HPs from Bayesian optimization (Optuna TPE, 20 trials, val_acc=0.891)
  learning_rate: 1.6327e-5
  per_device_train_batch_size: 16
  num_train_epochs: 4
  weight_decay: 0.0248
  warmup_ratio: 0.1
  seed: 42

uncertainty:
  scores:
    - max_proba_complement
    - predictive_entropy
    - doctor
    - energy
    - mahalanobis_distance

score_calibration:
  methods:
    - none
    - uniform_mass

output:
  cache_dir: cache/paper
