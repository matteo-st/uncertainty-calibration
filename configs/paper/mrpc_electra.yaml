# ELECTRA on MRPC — ICML Paper
#
# MRPC: Paraphrase detection, moderate difficulty, naturally small dataset.
# 3,668 total. n_cal=1000 (27%), n_train=2,668.
# Note: 27% to calibration is significant — paper should discuss this tradeoff.
#
# Training HPs: defaults from Vazhentsev 2022 reference, pending Bayesian optimization.

dataset:
  name: mrpc
  n_cal: 1000
  max_length: 128

model:
  name: google/electra-base-discriminator
  use_spectral_norm: false

training:
  # Defaults pending Bayesian optimization (~20 trials with Optuna TPE)
  learning_rate: 5.0e-5
  per_device_train_batch_size: 32
  num_train_epochs: 12
  weight_decay: 0.1
  warmup_ratio: 0.1
  seed: 42

uncertainty:
  scores:
    - max_proba_complement
    - predictive_entropy
    - doctor
    - energy
    - mahalanobis_distance

score_calibration:
  methods:
    - none
    - uniform_mass

output:
  cache_dir: cache/paper
