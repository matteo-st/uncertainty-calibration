# BERT on MRPC — ICML Paper
#
# MRPC: Paraphrase detection, moderate difficulty, naturally small dataset.
# 3,668 total. n_cal=1000 (27%), n_train=2,668.
#
# Training HPs: defaults from Devlin 2019, pending Bayesian optimization.

dataset:
  name: mrpc
  n_cal: 1000
  max_length: 128

model:
  name: google-bert/bert-base-uncased
  use_spectral_norm: false

training:
  # Best HPs from Bayesian optimization (Optuna TPE, 20 trials, val_acc=0.852)
  learning_rate: 1.5355e-5
  per_device_train_batch_size: 4
  num_train_epochs: 15
  weight_decay: 0.0058
  warmup_ratio: 0.1
  seed: 42

uncertainty:
  scores:
    - max_proba_complement
    - predictive_entropy
    - doctor
    - energy
    - mahalanobis_distance

score_calibration:
  methods:
    - none
    - uniform_mass

output:
  cache_dir: cache/paper
