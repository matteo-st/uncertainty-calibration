# BERT on SST-2 (10% subsample) — ICML Paper
#
# SST-2: Binary sentiment, easy task, low-resource setting.
# 10% of 67,349 = 6,735 available. n_cal=1000, n_train=5,735.
#
# Training HPs: defaults from Devlin 2019, pending Bayesian optimization.

dataset:
  name: sst2
  n_train: 5735
  n_cal: 1000
  max_length: 128

model:
  name: google-bert/bert-base-uncased
  use_spectral_norm: false

training:
  # Best HPs from Bayesian optimization (Optuna TPE, 20 trials, val_acc=0.915)
  learning_rate: 4.3346e-5
  per_device_train_batch_size: 64
  num_train_epochs: 9
  weight_decay: 0.0682
  warmup_ratio: 0.1
  seed: 42

uncertainty:
  scores:
    - max_proba_complement
    - predictive_entropy
    - doctor
    - energy
    - mahalanobis_distance

score_calibration:
  methods:
    - none
    - uniform_mass

output:
  cache_dir: cache/paper
